<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css">
    <title>Form login unitop.vn</title>
</head>

<body>
    <div id="wrapper">
        <form action="" id="form-login">
            <h1 class="form-heading">Form đăng nhập</h1>
            <div class="form-group">
                <i class="far fa-user"></i>
                <input type="text" class="form-input" placeholder="Tên đăng nhập">
            </div>
            <div class="form-group">
                <i class="fas fa-key"></i>
                <input type="password" class="form-input" placeholder="Mật khẩu">
                <div id="eye">
                    <i class="far fa-eye"></i>
                </div>
            </div>
            <input type="button" value="Đăng nhập bằng Google" class="form-submit" id="btn-login-google">
        </form>
    </div>


    <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

  const app = initializeApp({ 
    apiKey: "AIzaSyBjvnwBe7TCQPvL0xs4vy9N9UBOKCnEN2Q", 
    authDomain: "dangnhap1-c4cc0.firebaseapp.com", 
    projectId: "dangnhap1-c4cc0" 
  });
  const auth = getAuth(app); 
  const provider = new GoogleAuthProvider();

  const errorMsg = document.getElementById('error-msg');
  const wrapperDiv = document.getElementById('wrapper');

  function showError(text) { errorMsg.textContent = text; errorMsg.style.display = 'block'; }

  // --- THEO DÕI TRẠNG THÁI ---
  onAuthStateChanged(auth, (user) => {
    // ĐỒNG BỘ TÊN BIẾN: forceLogout (giống bên Blogger)
    const isForced = localStorage.getItem('forceLogout') === 'true';

    if (user && !isForced) {
      // Gửi dữ liệu về Blogger
      window.parent.postMessage({ 
        status: 'logged_in', 
        name: user.displayName || user.email.split('@')[0], 
        email: user.email, 
        avatar: user.photoURL || "https://i.imgur.com/3Z0o7v7.png", 
        uid: user.uid 
      }, "*");
      wrapperDiv.style.display = 'none'; 
    } else {
      // Nếu có user nhưng đang bị chặn thoát -> Ép thoát Firebase
      if (user && isForced) {
          signOut(auth);
      }
      wrapperDiv.style.display = 'block'; // Hiện lại form đăng nhập trắng
    }
  });

  // Mở khóa khi người dùng chủ động bấm vào các nút đăng nhập
  const unlockAuth = () => {
      localStorage.removeItem('forceLogout');
      errorMsg.style.display = 'none';
  };

  document.getElementById('btn-register').onclick = () => { 
      unlockAuth();
      const email = document.getElementById('email-input').value;
      const pass = document.getElementById('password-input').value;
      if(!email || !pass) return showError("Vui lòng nhập đầy đủ!"); 
      createUserWithEmailAndPassword(auth, email, pass).then(() => alert("Đăng ký thành công!")).catch((error) => showError("Lỗi: " + error.message)); 
  };

  document.getElementById('btn-login-email').onclick = () => { 
      unlockAuth();
      const email = document.getElementById('email-input').value;
      const pass = document.getElementById('password-input').value;
      if(!email || !pass) return showError("Vui lòng nhập đầy đủ!"); 
      signInWithEmailAndPassword(auth, email, pass).catch(() => showError("Sai tài khoản hoặc mật khẩu!")); 
  };

  document.getElementById('btn-login-google').onclick = (e) => { 
      e.preventDefault(); 
      unlockAuth();
      signInWithPopup(auth, provider).catch(() => showError("Lỗi đăng nhập Google!")); 
  };

  // LẮNG NGHE LỆNH TỪ BLOGGER (Cập nhật bản sửa lỗi liệt nút)
window.addEventListener('message', (event) => { 
    // Lệnh thoát
    if (event.data && event.data.action === 'request_logout') {
        localStorage.setItem('forceLogout', 'true'); 
        signOut(auth).then(() => {
            window.parent.postMessage({ status: 'logged_out' }, "*");
            document.getElementById('wrapper').style.display = 'block';
        });
    } 
    
    // Lệnh mở khóa (Khi Ánh bấm nút Đăng nhập ở trang chính)
    if (event.data && event.data.action === 'unlock_auth') {
        localStorage.removeItem('forceLogout'); // Xóa chặn ở phía GitHub
        console.log("Đã mở khóa đăng nhập trên GitHub");
    }
});
</script>
</body>
</html>
