<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="reset.css">

    <link rel="stylesheet" href="app.css">

    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css">

    <style>

        .btn-group { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 15px; }

        .btn-half { flex: 1; padding: 12px 0; border: none; border-radius: 4px; color: #fff; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        #btn-login-email { background-color: #576574; } #btn-login-email:hover { background-color: #8395a7; }

        #btn-register { background-color: #2ed573; } #btn-register:hover { background-color: #7bed9f; }

        .divider { text-align: center; color: rgba(255,255,255,0.5); margin-bottom: 15px; font-size: 14px; }

        #error-msg { color: #ff4757; font-size: 14px; text-align: center; margin-bottom: 15px; display: none; }

    </style>

</head>

<body>

    <div id="wrapper">

        <form id="form-login">

            <h1 class="form-heading">Đăng nhập</h1>

            <div class="form-group"><i class="far fa-envelope"></i><input type="email" class="form-input" id="email-input" placeholder="Email của bạn"></div>

            <div class="form-group"><i class="fas fa-key"></i><input type="password" class="form-input" id="password-input" placeholder="Mật khẩu (từ 6 ký tự)"></div>

            <div id="error-msg">Sai tài khoản hoặc mật khẩu!</div>

            <div class="btn-group"><input type="button" value="Đăng nhập" class="btn-half" id="btn-login-email"><input type="button" value="Đăng ký mới" class="btn-half" id="btn-register"></div>

            <div class="divider">HOẶC</div>

            <input type="button" value="ĐĂNG NHẬP BẰNG GOOGLE" class="form-submit" id="btn-login-google" style="background-color: #ea4335;">

        </form>

    </div>



    <script type="importmap">

      { "imports": { "firebase/app": "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js", "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js" } }

    </script>

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged, setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

  const app = initializeApp({ 
    apiKey: "AIzaSyBjvnwBe7TCQPvL0xs4vy9N9UBOKCnEN2Q", 
    authDomain: "dangnhap1-c4cc0.firebaseapp.com", 
    projectId: "dangnhap1-c4cc0" 
  });
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  // 1. CHỈ ĐĂNG NHẬP KHI NGƯỜI DÙNG CHỦ ĐỘNG BẤM
  onAuthStateChanged(auth, (user) => {
    // Nếu có user VÀ KHÔNG CÓ lệnh chặn từ Blogger
    if (user && localStorage.getItem('forceLogout') !== 'true') {
      
      // Gửi tín hiệu sang Blogger
      window.parent.postMessage({ 
        status: 'logged_in', 
        name: user.displayName || user.email.split('@')[0], 
        uid: user.uid,
        avatar: user.photoURL || "https://i.imgur.com/3Z0o7v7.png"
      }, "*");
      
      // Ẩn form đăng nhập
      document.getElementById('wrapper').style.display = 'none';
    } else {
      // Nếu không có user hoặc đang bị chặn -> Hiện form trắng
      document.getElementById('wrapper').style.display = 'block';
      // Nếu bị chặn nhưng vẫn còn user trong Firebase -> Ép thoát hẳn
      if (user && localStorage.getItem('forceLogout') === 'true') {
         signOut(auth);
      }
    }
  });

  // 2. KHI BẤM NÚT ĐĂNG NHẬP (Bất kể nút nào)
  const handleLoginAction = () => {
    localStorage.removeItem('forceLogout'); // Mở khóa cửa
    sessionStorage.removeItem('forceLogout');
  };

  document.getElementById('btn-login-google').onclick = () => {
    handleLoginAction();
    signInWithPopup(auth, provider);
  };
  
  // Ánh hãy thêm handleLoginAction() vào cả nút đăng nhập Email/Đăng ký nhé

  // 3. LẮNG NGHE LỆNH THOÁT TỪ BLOGGER
  window.addEventListener('message', async (event) => {
    if (event.data && event.data.action === 'request_logout') {
      // Đặt chốt chặn ngay lập tức
      localStorage.setItem('forceLogout', 'true');
      
      // Thoát Firebase
      await signOut(auth);
      
      // Báo về cho Blogger
      window.parent.postMessage({ status: 'logged_out' }, "*");
      
      // Tải lại trang để hiện khung đăng nhập sạch
      location.reload();
    }
  });
</script>

</body>

</html>
