    <style>
        .btn-group { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 15px; }
        .btn-half { flex: 1; padding: 12px 0; border: none; border-radius: 4px; color: #fff; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #btn-login-email { background-color: #576574; } #btn-login-email:hover { background-color: #8395a7; }
        #btn-register { background-color: #2ed573; } #btn-register:hover { background-color: #7bed9f; }
        .divider { text-align: center; color: rgba(255,255,255,0.5); margin-bottom: 15px; font-size: 14px; }
        #error-msg { color: #ff4757; font-size: 14px; text-align: center; margin-bottom: 15px; display: none; }
        .form-submit { width: 100%; padding: 12px; border: none; border-radius: 4px; color: #fff; font-weight: bold; cursor: pointer; }
        /* CSS bổ sung để đảm bảo giao diện hiển thị đúng */
        body { font-family: sans-serif; }
        #wrapper { display: block; }
        .form-group { background: #f1f3f5; border: 1px solid #ddd; border-radius: 4px; padding: 10px; margin-bottom: 15px; display: flex; align-items: center; }
        .form-group i { margin-right: 10px; color: #666; }
        .form-input { border: none; background: transparent; outline: none; width: 100%; }
    </style>
</head>

            <div class="divider">HOẶC</div>

        </form>

  const unlockAuth = () => {
      localStorage.removeItem('forceLogout');
      errorMsg.style.display = 'none';
  };

  document.getElementById('btn-register').onclick = () => { 
      unlockAuth();
      const email = document.getElementById('email-input').value;
      const pass = document.getElementById('password-input').value;
      if(!email || !pass) return showError("Vui lòng nhập đầy đủ!"); 
      createUserWithEmailAndPassword(auth, email, pass).then(() => alert("Đăng ký thành công!")).catch((error) => showError("Lỗi: " + error.message)); 
  };

  document.getElementById('btn-login-email').onclick = () => { 
      unlockAuth();
      const email = document.getElementById('email-input').value;
      const pass = document.getElementById('password-input').value;
      if(!email || !pass) return showError("Vui lòng nhập đầy đủ!"); 
      signInWithEmailAndPassword(auth, email, pass).catch(() => showError("Sai tài khoản hoặc mật khẩu!")); 
  };

  document.getElementById('btn-login-google').onclick = (e) => { 
      e.preventDefault(); 
      unlockAuth();
      signInWithPopup(auth, provider).catch(() => showError("Lỗi đăng nhập Google!")); 
  };

  // LẮNG NGHE LỆNH TỪ BLOGGER (Cập nhật bản sửa lỗi liệt nút)
window.addEventListener('message', (event) => { 
    // Lệnh thoát
    if (event.data && event.data.action === 'request_logout') {
        localStorage.setItem('forceLogout', 'true'); 
        signOut(auth).then(() => {
            window.parent.postMessage({ status: 'logged_out' }, "*");
            document.getElementById('wrapper').style.display = 'block';
        });
    }

    if (event.data && event.data.action === 'unlock_auth') {
        localStorage.removeItem('forceLogout'); // Xóa chặn ở phía GitHub
        console.log("Đã mở khóa đăng nhập trên GitHub");
