<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css">
    <style>
        .btn-group { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 15px; }
        .btn-half { flex: 1; padding: 12px 0; border: none; border-radius: 4px; color: #fff; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #btn-login-email { background-color: #576574; } #btn-login-email:hover { background-color: #8395a7; }
        #btn-register { background-color: #2ed573; } #btn-register:hover { background-color: #7bed9f; }
        .divider { text-align: center; color: rgba(255,255,255,0.5); margin-bottom: 15px; font-size: 14px; }
        #error-msg { color: #ff4757; font-size: 14px; text-align: center; margin-bottom: 15px; display: none; }
        .form-submit { width: 100%; padding: 12px; border: none; border-radius: 4px; color: #fff; font-weight: bold; cursor: pointer; }
        /* CSS bổ sung để đảm bảo giao diện hiển thị đúng */
        body { font-family: sans-serif; }
        #wrapper { display: block; }
        .form-group { background: #f1f3f5; border: 1px solid #ddd; border-radius: 4px; padding: 10px; margin-bottom: 15px; display: flex; align-items: center; }
        .form-group i { margin-right: 10px; color: #666; }
        .form-input { border: none; background: transparent; outline: none; width: 100%; }
    </style>
</head>
<body>
    <div id="wrapper">
        <form id="form-login">
            <h1 class="form-heading" style="text-align:center; font-size: 20px; margin-bottom: 20px;">ĐĂNG NHẬP ÁNH SHOP</h1>
            <div class="form-group"><i class="far fa-envelope"></i><input type="email" class="form-input" id="email-input" placeholder="Email của bạn"></div>
            <div class="form-group"><i class="fas fa-key"></i><input type="password" class="form-input" id="password-input" placeholder="Mật khẩu"></div>
            <div id="error-msg"></div>
            <div class="btn-group">
                <input type="button" value="Đăng nhập" class="btn-half" id="btn-login-email">
                <input type="button" value="Đăng ký" class="btn-half" id="btn-register">
            </div>
            <div class="divider">HOẶC</div>
            <input type="button" value="ĐĂNG NHẬP BẰNG GOOGLE" class="form-submit" id="btn-login-google" style="background-color: #ea4335;">
        </form>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
      import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

      const app = initializeApp({ apiKey: "AIzaSyBjvnwBe7TCQPvL0xs4vy9N9UBOKCnEN2Q", authDomain: "dangnhap1-c4cc0.firebaseapp.com", projectId: "dangnhap1-c4cc0" });
      const auth = getAuth(app); 
      const provider = new GoogleAuthProvider();

      const errorMsg = document.getElementById('error-msg');
      const wrapperDiv = document.getElementById('wrapper');

      function showError(text) { errorMsg.textContent = text; errorMsg.style.display = 'block'; }

      // --- CƠ CHẾ CHỐNG TỰ ĐỘNG ĐĂNG NHẬP ---
      onAuthStateChanged(auth, (user) => {
        // Nếu có user VÀ KHÔNG PHẢI trong trạng thái ép thoát (force_logout)
        if (user && localStorage.getItem('isForceLogout') !== 'true') {
          const name = user.displayName || user.email.split('@')[0];
          window.parent.postMessage({ 
            status: 'logged_in', 
            name: name, 
            email: user.email, 
            avatar: user.photoURL || "https://i.imgur.com/3Z0o7v7.png", 
            uid: user.uid 
          }, "*");
          wrapperDiv.style.display = 'none'; // Ẩn form khi đã vào
        } else {
          wrapperDiv.style.display = 'block';
          if (user && localStorage.getItem('isForceLogout') === 'true') {
             signOut(auth); // Ép thoát Firebase nếu đang có lệnh chặn
          }
        }
      });

      // Hàm mở khóa chặn khi người dùng chủ động bấm đăng nhập
      const unlockAuth = () => {
          localStorage.removeItem('isForceLogout');
          errorMsg.style.display = 'none';
      };

      document.getElementById('btn-register').onclick = () => { 
          unlockAuth();
          const email = document.getElementById('email-input').value;
          const pass = document.getElementById('password-input').value;
          if(!email || !pass) return showError("Vui lòng nhập đầy đủ!"); 
          createUserWithEmailAndPassword(auth, email, pass).then(() => alert("Đăng ký thành công!")).catch((error) => showError("Lỗi: " + error.message)); 
      };

      document.getElementById('btn-login-email').onclick = () => { 
          unlockAuth();
          const email = document.getElementById('email-input').value;
          const pass = document.getElementById('password-input').value;
          if(!email || !pass) return showError("Vui lòng nhập đầy đủ!"); 
          signInWithEmailAndPassword(auth, email, pass).catch(() => showError("Sai tài khoản hoặc mật khẩu!")); 
      };

      document.getElementById('btn-login-google').onclick = (e) => { 
          e.preventDefault(); 
          unlockAuth();
          signInWithPopup(auth, provider).catch(() => showError("Lỗi đăng nhập Google!")); 
      };

      // LẮNG NGHE LỆNH THOÁT TỪ BLOGGER
      window.addEventListener('message', (event) => { 
          if (event.data && event.data.action === 'request_logout') {
              localStorage.setItem('isForceLogout', 'true'); // Cắm biển chặn
              signOut(auth).then(() => {
                  window.parent.postMessage({ status: 'logged_out' }, "*");
                  location.reload(); // Làm mới để hiện khung đăng nhập trắng
              });
          } 
      });
    </script>
</body>
</html>
