<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css">
    <style>
        /* Giữ nguyên CSS cũ của Ánh */
        .btn-group { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 15px; }
        .btn-half { flex: 1; padding: 12px 0; border: none; border-radius: 4px; color: #fff; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #btn-login-email { background-color: #576574; }
        #btn-register { background-color: #2ed573; }
        .divider { text-align: center; color: rgba(255,255,255,0.5); margin-bottom: 15px; font-size: 14px; }
        #error-msg { color: #ff4757; font-size: 14px; text-align: center; margin-bottom: 15px; display: none; }
        #wrapper { display: block; }
    </style>
</head>
<body>
    <div id="wrapper">
        <form id="form-login">
            <h1 class="form-heading">Đăng nhập Ánh Shop</h1>
            <div class="form-group"><i class="far fa-envelope"></i><input type="email" id="email-input" placeholder="Email"></div>
            <div class="form-group"><i class="fas fa-key"></i><input type="password" id="password-input" placeholder="Mật khẩu"></div>
            <div id="error-msg"></div>
            <div class="btn-group">
                <input type="button" value="Đăng nhập" class="btn-half" id="btn-login-email">
                <input type="button" value="Đăng ký" class="btn-half" id="btn-register">
            </div>
            <div class="divider">HOẶC</div>
            <input type="button" value="ĐĂNG NHẬP GOOGLE" id="btn-login-google" style="width:100%; padding:12px; background:#ea4335; color:#fff; border:none; border-radius:4px; font-weight:bold; cursor:pointer;">
        </form>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
      import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

      const app = initializeApp({ apiKey: "AIzaSyBjvnwBe7TCQPvL0xs4vy9N9UBOKCnEN2Q", authDomain: "dangnhap1-c4cc0.firebaseapp.com", projectId: "dangnhap1-c4cc0" });
      const auth = getAuth(app); 
      const provider = new GoogleAuthProvider();

      // --- CƠ CHẾ CHỐNG TỰ ĐỘNG ĐĂNG NHẬP ---
      onAuthStateChanged(auth, (user) => {
        // Nếu có user VÀ KHÔNG PHẢI vừa bấm Đăng xuất xong
        if (user && localStorage.getItem('isLoggingOut') !== 'true') {
          const name = user.displayName || user.email.split('@')[0];
          window.parent.postMessage({ 
            status: 'logged_in', 
            name: name, 
            email: user.email, 
            avatar: user.photoURL || "https://i.imgur.com/3Z0o7v7.png", 
            uid: user.uid 
          }, "*");
        } else {
          // Hiện form đăng nhập nếu chưa có user hoặc đang đăng xuất
          document.getElementById('wrapper').style.display = 'block';
        }
      });

      // Lắng nghe lệnh đăng xuất từ Blogger
      window.addEventListener('message', (event) => {
        if (event.data && event.data.action === 'request_logout') {
          localStorage.setItem('isLoggingOut', 'true'); // Đánh dấu đang thoát
          signOut(auth).then(() => {
            window.parent.postMessage({ status: 'logged_out' }, "*");
          });
        }
      });

      // Khi người dùng CHỦ ĐỘNG bấm nút đăng nhập, xóa dấu vết cũ
      const clearLogoutFlag = () => localStorage.removeItem('isLoggingOut');

      document.getElementById('btn-login-google').onclick = () => { clearLogoutFlag(); signInWithPopup(auth, provider); };
      document.getElementById('btn-login-email').onclick = () => { clearLogoutFlag(); /* code login email của bạn */ };
    </script>
</body>
</html>
